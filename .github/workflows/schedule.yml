name: Tabi Shoku Hiyori LINE Bot

on:
  schedule:
    # TEST: 暫時改成台灣時間 11:52 (UTC 03:52) 測試排程觸發
    - cron: "52 3 * * *"
    # 每天 22:00 (台灣時間) = UTC 14:00 -> 推送複習提醒
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send new words (10:00)
        if: github.event.schedule == '52 3 * * *'
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python send_words.py

      - name: Send review reminder (22:00)
        if: github.event.schedule == '0 14 * * *'
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python send_review.py

      - name: Commit updated progress
        if: github.event.schedule == '52 3 * * *'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add progress.json
          git diff --staged --quiet || git commit -m "chore: update progress"
          git push
