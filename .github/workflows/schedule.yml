name: Tabi Shoku Hiyori LINE Bot

on:
  workflow_dispatch:
    inputs:
      task:
        description: "要執行的任務 (words=10:00推送新單字, review=22:00複習提醒)"
        type: choice
        options:
          - words
          - review
        default: words

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send new words (10:00)
        if: github.event.inputs.task == 'words'
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python send_words.py

      - name: Send review reminder (22:00)
        if: github.event.inputs.task == 'review'
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python send_review.py

      - name: Commit updated progress
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add progress.json
          git diff --staged --quiet || git commit -m "chore: update progress"
          git push
